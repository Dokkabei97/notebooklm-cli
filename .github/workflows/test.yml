name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o nlm .

      - name: Unit tests
        run: go test ./internal/... -v -count=1

  test:
    name: Build (${{ matrix.os }}, Go ${{ matrix.go-version }})
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.21", "1.22", "1.23"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build -o nlm .
        shell: bash

      - name: Basic CLI tests
        shell: bash
        run: |
          ./nlm version
          ./nlm --help
          ./nlm notebook --help
          ./nlm completion bash > /dev/null

      - name: Unit tests
        run: go test ./internal/... -count=1

  e2e-basic:
    name: E2E Basic (no auth)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build -o nlm .

      - name: E2E basic tests
        run: |
          NLM_BINARY=$(pwd)/nlm go test ./e2e/ -v \
            -run "TestVersion|TestHelp|TestSubcommand|TestCompletion|TestUnknown|TestUseRequires|Test.*Aliases|TestGlobalFlags" \
            -count=1 -timeout 30s
